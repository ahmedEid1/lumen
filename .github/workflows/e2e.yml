name: E2E (Playwright)

# Phase H3 gate: walks the five behavioural golden paths against the
# full docker-compose stack. Runs Playwright against the live web
# container with LLM_PROVIDER=noop pinned so the AI-touching paths
# stay deterministic and free.
#
# Companion to the Phase D5 accessibility.yml workflow. The two
# overlap on Playwright + docker setup, but live as separate jobs
# because:
#   - the axe gate is project=chromium-only, the e2e gate runs the
#     full {chromium, webkit} matrix Playwright's config defines;
#   - the e2e gate needs Mailpit (for the verify + reset tokens) and
#     a one-shot embedding index pass for the tutor citations spec —
#     extra steps the lighter a11y gate doesn't need;
#   - keeping them split means one slow run doesn't block the other's
#     signal to PR authors.
#
# Triggers:
#   - PRs to Rewrite or master
#   - pushes to Rewrite

on:
  push:
    branches: [Rewrite]
  pull_request:
    branches: [Rewrite, master]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright golden paths
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        # The e2e suite needs LLM_PROVIDER=noop AND EMBEDDING_PROVIDER=noop
        # pinned regardless of what's in .env.example. LLM noop keeps the
        # tutor turns deterministic + free. Embedding noop avoids importing
        # sentence-transformers — it's not in pyproject.toml's dep list
        # (only in the type-ignore stubs), so the `local` default would
        # crash the `Pre-index seeded lesson chunks` step with
        # ModuleNotFoundError. NoopEmbeddingProvider returns deterministic
        # L2-normalised unit vectors derived from SHA-256, which is exactly
        # what the tutor-citations spec needs (a stable vector per chunk
        # to drive retrieval ordering — semantic quality isn't asserted).
        # `>>` keeps any other tweaks the operator has made to the
        # template (e.g. SEED_DEMO=true is already on by default).
        run: |
          cp .env.example .env
          {
            echo ""
            echo "# e2e workflow overrides"
            echo "LLM_PROVIDER=noop"
            echo "EMBEDDING_PROVIDER=noop"
          } >> .env

      - name: Start dev stack
        # Bring up everything the e2e specs touch: db, redis, s3 (for
        # the ingest preview's image fetches), mailpit (for the auth
        # spec's token retrieval), api, worker (so embedding ingestion
        # actually runs against the seeded course), and web.
        run: |
          docker compose up -d --build \
            db redis s3 s3-init mail api worker web

      - name: Wait for api healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v1/health/live >/dev/null 2>&1; then
              echo "api up"; exit 0
            fi
            sleep 2
          done
          echo "api never became healthy"; docker compose logs api; exit 1

      - name: Wait for web ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "web up"; exit 0
            fi
            sleep 2
          done
          echo "web never became reachable"; docker compose logs web; exit 1

      - name: Wait for mailpit ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8025/api/v1/info >/dev/null 2>&1; then
              echo "mailpit up"; exit 0
            fi
            sleep 1
          done
          echo "mailpit never became reachable"; docker compose logs mail; exit 1

      - name: Migrate + seed
        run: |
          docker compose exec -T api alembic upgrade head
          docker compose exec -T api python -m app.cli seed

      - name: Pre-index seeded lesson chunks
        # The seed inserts the published course directly, bypassing
        # the publish hook that normally enqueues
        # ``index_course_embeddings``. The tutor-citations spec
        # needs lesson_chunks populated to surface citations, so we
        # run the indexing inline here.
        run: |
          docker compose exec -T api python -c "
          import asyncio
          from sqlalchemy import select
          from app.db.base import get_sessionmaker
          from app.models.course import Course, CourseStatus
          from app.services.embeddings_ingest import ingest_course

          async def main():
              Session = get_sessionmaker()
              async with Session() as db:
                  rows = (await db.execute(
                      select(Course.id).where(
                          Course.status == CourseStatus.published,
                          Course.deleted_at.is_(None),
                      )
                  )).all()
                  for (cid,) in rows:
                      written = await ingest_course(db, cid)
                      print(f'indexed {cid}: {written} chunks')

          asyncio.run(main())
          "

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('apps/frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install-deps chromium webkit

      - name: Run Playwright e2e suite
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_BASE_URL: http://localhost:8000
          MAILPIT_BASE_URL: http://localhost:8025
        # Pin the golden-path specs explicitly so we don't pick up
        # the unrelated axe scan in this workflow (that runs in its
        # own accessibility.yml workflow).
        run: |
          pnpm exec playwright test \
            tests/e2e/auth.spec.ts \
            tests/e2e/learner-flow.spec.ts \
            tests/e2e/instructor-golden.spec.ts \
            tests/e2e/tutor-citations.spec.ts \
            tests/e2e/ingest-multimodal.spec.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Capture container logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/compose-logs
          docker compose logs --no-color api > /tmp/compose-logs/api.log || true
          docker compose logs --no-color worker > /tmp/compose-logs/worker.log || true
          docker compose logs --no-color web > /tmp/compose-logs/web.log || true
          docker compose logs --no-color mail > /tmp/compose-logs/mail.log || true

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: /tmp/compose-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down dev stack
        if: always()
        run: docker compose down -v
