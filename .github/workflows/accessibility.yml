name: Accessibility (WCAG 2.2 AA)

# Phase D5 gate: every PR and every push to long-lived branches runs
# axe-core inside a real browser against the built Next.js app on the
# golden-path routes and fails the build on any AA violation. The
# April 24 2026 WCAG 2.2 AA effective date applies broadly, so this
# is treated as a release blocker, not a soft check.
#
# To debug a failure locally, see `docs/accessibility.md`. The
# in-repo `make a11y` target runs the same `accessibility.spec.ts`
# file against an already-up dev stack.

on:
  push:
    branches: [Rewrite, master]
  pull_request:

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  axe:
    name: axe-core WCAG 2.2 AA
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # COMPOSE_FILE picks up the overlay that switches `web` from the
    # dev JIT-compile target to the prod standalone build. Same
    # rationale as e2e.yml — kills the hydration race that was
    # flaking authenticated routes. See docker-compose.ci.yml for
    # the full why.
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v4

      # The accessibility audit needs the full dev stack: api, db,
      # redis, s3, and the seeded demo data. We use the same
      # docker-compose.yml that `make up` uses so the audit hits the
      # same surfaces a developer sees locally.
      - name: Prepare .env
        run: cp .env.example .env

      - name: Start dev stack
        run: docker compose up -d --build db redis s3 s3-init mail api web

      - name: Wait for api healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v1/health/live >/dev/null 2>&1; then
              echo "api up"; exit 0
            fi
            sleep 2
          done
          echo "api never became healthy"; docker compose logs api; exit 1

      - name: Wait for web ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "web up"; exit 0
            fi
            sleep 2
          done
          echo "web never became reachable"; docker compose logs web; exit 1

      - name: Migrate + seed
        run: |
          docker compose exec -T api alembic upgrade head
          docker compose exec -T api python -m app.cli seed

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile || pnpm install

      # Cache the Playwright browser binaries — they're ~300 MB and
      # the WCAG suite only needs Chromium, but the install also
      # pulls system deps via apt. Re-running the install when the
      # cache hits is a no-op.
      - name: Get Playwright version
        id: playwright-version
        working-directory: apps/frontend
        # Bake the Playwright version into the cache key so a lockfile-
        # hash hit on stale binaries can't poison the run. See e2e.yml
        # for the full rationale.
        run: |
          v=$(jq -r '.devDependencies["@playwright/test"] // .dependencies["@playwright/test"]' package.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # `pw2` segment matches e2e.yml's bust — see that file's
          # cache step for the reason. Keeps the two workflows on the
          # same cache lineage so the first runner to populate it
          # serves both.
          key: ${{ runner.os }}-pw2-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('apps/frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install-deps chromium

      - name: Run axe accessibility suite
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        # Project-pinned to chromium — axe-core's rule set is
        # browser-agnostic and running every spec across chromium +
        # webkit doubles wallclock for no extra signal.
        run: pnpm exec playwright test tests/e2e/accessibility.spec.ts --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-axe-report
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          if-no-files-found: ignore

      - name: Tear down dev stack
        if: always()
        run: docker compose down -v
