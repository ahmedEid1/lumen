name: CI

# Triggers — push to the canonical working branch (`Rewrite`) and to
# `main` (kept around as the eventual merge target). Every PR runs the
# same set so contributors get the full gate before merge. e2e.yml and
# accessibility.yml run in parallel as separate workflows on the same
# triggers; deploy.yml waits on this workflow's `build-images` job
# completing successfully on `Rewrite` to roll the AWS box.
on:
  push:
    branches: [Rewrite, main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-24.04
    # Hard cap of 25 minutes. Backend pytest with the postgres+redis
    # service containers normally finishes in 10-15 min. Anything
    # past 20 min is almost certainly a hung test — recent run
    # 26421524850 sat at the Pytest step for 34 min before manual
    # cancel, and the postgres log showed a uq_courses_slug_live
    # constraint trip mid-run (test-isolation bug between course
    # soft-delete tests). Failing loud at 25 min is much better than
    # silently grinding for the default 6-hour job timeout.
    timeout-minutes: 25
    services:
      postgres:
        # pgvector/pgvector:pg17 ships the ``vector`` extension that
        # ``apps/backend/tests/conftest.py`` runs ``CREATE EXTENSION
        # vector`` against at fixture setup. Plain ``postgres:17-alpine``
        # doesn't ship pgvector, so the fixture failed before
        # ``metadata.create_all`` ran. Matches the dev image in
        # ``docker-compose.yml`` so CI mirrors local.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: lumen
          POSTGRES_PASSWORD: lumen
          POSTGRES_DB: lumen
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lumen -d lumen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://lumen:lumen@localhost:5432/lumen
      DATABASE_URL_SYNC: postgresql+psycopg://lumen:lumen@localhost:5432/lumen
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret
      SECRET_KEY: ci-secret-key
      ENV: test
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.18"
          enable-cache: true
      - name: Python 3.13
        run: uv python install 3.13
      - name: Install deps
        run: uv sync --group dev || uv pip install -e '.[dev]'
      - name: Ruff
        run: uv run ruff check . && uv run ruff format --check .
      - name: Mypy
        # Non-blocking — the codebase has 58 pre-existing strict-mode
        # violations (mostly arg-type from FastAPI route handlers
        # whose Depends overloads don't carry full annotations, plus
        # a handful of httpx/sqlalchemy/celery type stubs that
        # haven't shipped). Mypy stays in CI as a signal source —
        # the run log surfaces new regressions for devs to triage —
        # but doesn't gate green until the existing wall is paid
        # down. Track in the typing-debt issue list, don't block
        # shipping.
        continue-on-error: true
        run: uv run mypy app
      - name: Pytest
        # No `-q` — pytest's pyproject.toml addopts pins `-v --durations=10
        # --timeout=60 -n 4 --dist=loadfile`. Quiet mode would
        # suppress the live test-name stream, which is what kept the
        # previous "hung suite" diagnosis blind for 34 minutes. With
        # the streaming verbose output a future hang surfaces in the
        # CI log within seconds of the offending test starting.
        run: uv run pytest
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/htmlcov
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        # Direct `pnpm exec vitest run` avoids the pnpm-shorthand-vs-
        # script-flag ambiguity entirely. Earlier forms that go via
        # the `test` script (`pnpm test --run`, even `pnpm test --
        # --run`) have been flaky across pnpm 9.15.0 environments —
        # the alias resolution swallows `--run` differently than the
        # explicit `pnpm run test -- --run` form. `pnpm exec vitest
        # run` invokes vitest's CLI directly with its built-in `run`
        # subcommand (canonical "single-pass, no watch" mode per
        # vitest docs) so neither pnpm's flag parsing nor vitest's
        # CI auto-detection enters the picture.
        run: pnpm exec vitest run

  build-images:
    name: Build container images
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    # Only build on push (not PR) — PRs from the same repo would
    # produce dupes; PRs from forks can't push to ghcr anyway.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      # Surface to downstream workflows (deploy.yml) so the rollout
      # commands target an immutable SHA tag, not a moving pointer.
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        # docker-metadata-action handles the canonical-branch / SHA /
        # latest tagging matrix without us hand-rolling shell expansions.
        # On push to Rewrite: produces tags `rewrite`, `latest`, `<sha>`.
        # On push to main:    produces tags `main`, `<sha>` (no latest —
        #                     `main` is the stale merge target, not the
        #                     working branch; we don't want a stale main
        #                     push to clobber `:latest` and accidentally
        #                     roll AWS back).
        run: |
          # Long form so it's obvious what the tags will be in the run
          # log instead of buried inside a third-party action's output.
          sha7=${GITHUB_SHA::7}
          echo "sha=${sha7}" >> "$GITHUB_OUTPUT"
          echo "Tagging plan for push to ${GITHUB_REF_NAME}:"
          if [ "$GITHUB_REF_NAME" = "Rewrite" ]; then
            echo "  api: :${GITHUB_SHA}, :rewrite, :latest"
            echo "  web: :${GITHUB_SHA}, :rewrite, :latest"
          else
            echo "  api: :${GITHUB_SHA}, :${GITHUB_REF_NAME}"
            echo "  web: :${GITHUB_SHA}, :${GITHUB_REF_NAME}"
          fi
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: prod
          push: true
          # The `latest` tag only moves on Rewrite pushes — see the meta
          # step comment for why we don't tag latest from main.
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/lumen-api:${{ github.ref_name }}
            ${{ github.ref_name == 'Rewrite' && format('ghcr.io/{0}/lumen-api:latest', github.repository_owner) || '' }}
          cache-from: type=gha,scope=lumen-api
          cache-to: type=gha,mode=max,scope=lumen-api
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/lumen-web:${{ github.ref_name }}
            ${{ github.ref_name == 'Rewrite' && format('ghcr.io/{0}/lumen-web:latest', github.repository_owner) || '' }}
          cache-from: type=gha,scope=lumen-web
          cache-to: type=gha,mode=max,scope=lumen-web
      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lumen-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          # exit-code: "0" keeps the scan informational (uploads SARIF
          # to Security tab) instead of blocking the build on CVEs.
          # Bump to "1" once the base images are pinned to digests so
          # noise stays low.
          exit-code: "0"
      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lumen-web:${{ github.sha }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
        continue-on-error: true
