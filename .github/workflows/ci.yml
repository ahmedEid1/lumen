name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-24.04
    services:
      postgres:
        # pgvector/pgvector:pg17 ships the ``vector`` extension that
        # ``apps/backend/tests/conftest.py`` runs ``CREATE EXTENSION
        # vector`` against at fixture setup. Plain ``postgres:17-alpine``
        # doesn't ship pgvector, so the fixture failed before
        # ``metadata.create_all`` ran. Matches the dev image in
        # ``docker-compose.yml`` so CI mirrors local.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: lumen
          POSTGRES_PASSWORD: lumen
          POSTGRES_DB: lumen
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lumen -d lumen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://lumen:lumen@localhost:5432/lumen
      DATABASE_URL_SYNC: postgresql+psycopg://lumen:lumen@localhost:5432/lumen
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret
      SECRET_KEY: ci-secret-key
      ENV: test
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.18"
          enable-cache: true
      - name: Python 3.13
        run: uv python install 3.13
      - name: Install deps
        run: uv sync --group dev || uv pip install -e '.[dev]'
      - name: Ruff
        run: uv run ruff check . && uv run ruff format --check .
      - name: Mypy
        run: uv run mypy app
      - name: Pytest
        run: uv run pytest -q
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/htmlcov
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test --run

  build-images:
    name: Build container images
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        run: |
          REPO=${GITHUB_REPOSITORY,,}
          echo "api=ghcr.io/${REPO/lumen-api/lumen-api}-api" >> $GITHUB_OUTPUT
          echo "web=ghcr.io/${REPO/lumen-web/lumen-web}-web" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/lumen-api:main
          cache-from: type=gha,scope=lumen-api
          cache-to: type=gha,mode=max,scope=lumen-api
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/lumen-web:main
          cache-from: type=gha,scope=lumen-web
          cache-to: type=gha,mode=max,scope=lumen-web
      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lumen-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lumen-web:${{ github.sha }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
        continue-on-error: true
