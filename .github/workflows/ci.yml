name: CI

# Triggers — push to the canonical default branch (`main`) and every
# PR. Each push/PR walks the full ship-readiness gate as a chain of
# jobs in this single workflow:
#
#   backend ─┐
#            ├─▶ build-images ─┐
#   frontend ┤                 │
#            ├─▶ e2e ──────────┼─▶ deploy (push to main only)
#            └─▶ accessibility ┘
#
# `needs:` enforces the AND naturally — the deploy job only fires after
# every upstream gate has gone green on the same SHA. On push to main,
# the deploy job invokes deploy.yml as a reusable workflow, which is
# gated on the `production` GitHub Environment so a human approves
# before the SSH steps run.
#
# History: e2e + accessibility used to live in their own workflow
# files; they were inlined here on 2026-05-26 (iter 4) so the deploy
# gate could `needs:` them without resorting to the `workflow_run`
# fires-per-upstream-workflow trap. Branch rename: `Rewrite` →
# `main`, `master` → `legacy`, same day.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-24.04
    # Hard cap of 25 minutes. Backend pytest with the postgres+redis
    # service containers normally finishes in 10-15 min. Anything
    # past 20 min is almost certainly a hung test — recent run
    # 26421524850 sat at the Pytest step for 34 min before manual
    # cancel, and the postgres log showed a uq_courses_slug_live
    # constraint trip mid-run (test-isolation bug between course
    # soft-delete tests). Failing loud at 25 min is much better than
    # silently grinding for the default 6-hour job timeout.
    timeout-minutes: 25
    services:
      postgres:
        # pgvector/pgvector:pg17 ships the ``vector`` extension that
        # ``apps/backend/tests/conftest.py`` runs ``CREATE EXTENSION
        # vector`` against at fixture setup. Plain ``postgres:17-alpine``
        # doesn't ship pgvector, so the fixture failed before
        # ``metadata.create_all`` ran. Matches the dev image in
        # ``docker-compose.yml`` so CI mirrors local.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: lumen
          POSTGRES_PASSWORD: lumen
          POSTGRES_DB: lumen
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lumen -d lumen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://lumen:lumen@localhost:5432/lumen
      DATABASE_URL_SYNC: postgresql+psycopg://lumen:lumen@localhost:5432/lumen
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret
      SECRET_KEY: ci-secret-key
      ENV: test
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.18"
          enable-cache: true
      - name: Python 3.13
        run: uv python install 3.13
      - name: Install deps
        run: uv sync --group dev || uv pip install -e '.[dev]'
      - name: Ruff
        run: uv run ruff check . && uv run ruff format --check .
      - name: Mypy
        # Non-blocking — the codebase has 58 pre-existing strict-mode
        # violations (mostly arg-type from FastAPI route handlers
        # whose Depends overloads don't carry full annotations, plus
        # a handful of httpx/sqlalchemy/celery type stubs that
        # haven't shipped). Mypy stays in CI as a signal source —
        # the run log surfaces new regressions for devs to triage —
        # but doesn't gate green until the existing wall is paid
        # down. Track in the typing-debt issue list, don't block
        # shipping.
        continue-on-error: true
        run: uv run mypy app
      - name: Pytest
        # No `-q` — pytest's pyproject.toml addopts pins `-v --durations=10
        # --timeout=120 -n 4 --dist=loadfile --max-worker-restart=0`.
        # Quiet mode would
        # suppress the live test-name stream, which is what kept the
        # previous "hung suite" diagnosis blind for 34 minutes. With
        # the streaming verbose output a future hang surfaces in the
        # CI log within seconds of the offending test starting.
        run: uv run pytest
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/htmlcov
          if-no-files-found: ignore

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        # Direct `pnpm exec vitest run` avoids the pnpm-shorthand-vs-
        # script-flag ambiguity entirely. Earlier forms that go via
        # the `test` script (`pnpm test --run`, even `pnpm test --
        # --run`) have been flaky across pnpm 9.15.0 environments —
        # the alias resolution swallows `--run` differently than the
        # explicit `pnpm run test -- --run` form. `pnpm exec vitest
        # run` invokes vitest's CLI directly with its built-in `run`
        # subcommand (canonical "single-pass, no watch" mode per
        # vitest docs) so neither pnpm's flag parsing nor vitest's
        # CI auto-detection enters the picture.
        run: pnpm exec vitest run

  build-images:
    name: Build container images
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    # Only build on push (not PR) — PRs from the same repo would
    # produce dupes; PRs from forks can't push to ghcr anyway.
    if: github.event_name == 'push'
    # Multi-arch (amd64 native + arm64 via QEMU emulation) makes this
    # job ~3-4x longer than the previous amd64-only build. A cold
    # GHA cache + emulated `uv sync` / `pnpm install` / Next.js
    # build can push 25-35 min. 60 min hard cap so a hung emulation
    # fails loud well before the 6-hour default ceiling.
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    outputs:
      # Surface to downstream workflows (deploy.yml) so the rollout
      # commands target an immutable SHA tag, not a moving pointer.
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      # QEMU registers binfmt_misc handlers on the runner so buildx can
      # cross-build for non-host architectures. Required for the
      # `linux/arm64` half of the multi-arch build below — the AWS
      # production box is a t4g.small (Graviton / aarch64), and the
      # default amd64-only image was throwing `no matching manifest
      # for linux/arm64/v8` on every `docker compose pull` in
      # deploy.yml (see run 26433960527, 2026-05-26). The amd64 build
      # runs natively on the ubuntu-24.04 runner; the arm64 build runs
      # under QEMU emulation — slower, but keeps everything on one
      # runner and produces a single multi-arch manifest. If build
      # time becomes a problem, the alternative is a matrix with
      # ubuntu-24.04 + ubuntu-24.04-arm and a separate manifest-merge
      # step.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        # Emits canonical-branch / SHA / latest tag inputs without
        # hand-rolling shell expansions per tag.
        # On push to main: produces tags `main`, `latest`, `<sha>`.
        #
        # Also emits ``owner_lc`` — GHCR rejects mixed-case repository
        # names (``ghcr.io/ahmedEid1/...`` -> "repository name must be
        # lowercase"). ``${{ github.repository_owner }}`` preserves the
        # original GitHub casing, so we have to lowercase it ourselves
        # before splicing into the image tags below.
        run: |
          # Long form so it's obvious what the tags will be in the run
          # log instead of buried inside a third-party action's output.
          sha7=${GITHUB_SHA::7}
          echo "sha=${sha7}" >> "$GITHUB_OUTPUT"
          owner_lc=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "Tagging plan for push to ${GITHUB_REF_NAME} (owner=${owner_lc}):"
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "  api: :${GITHUB_SHA}, :main, :latest"
            echo "  web: :${GITHUB_SHA}, :main, :latest"
          else
            echo "  api: :${GITHUB_SHA}, :${GITHUB_REF_NAME}"
            echo "  web: :${GITHUB_SHA}, :${GITHUB_REF_NAME}"
          fi
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: prod
          push: true
          # Multi-arch manifest: amd64 builds natively, arm64 builds
          # under QEMU emulation (set up via setup-qemu-action above).
          # GHA cache is scoped per-arch automatically by buildx.
          platforms: linux/amd64,linux/arm64
          # `latest` moves on every push to main.
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/lumen-api:${{ github.sha }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/lumen-api:${{ github.ref_name }}
            ${{ github.ref_name == 'main' && format('ghcr.io/{0}/lumen-api:latest', steps.meta.outputs.owner_lc) || '' }}
          cache-from: type=gha,scope=lumen-api
          cache-to: type=gha,mode=max,scope=lumen-api
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          target: prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/lumen-web:${{ github.sha }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/lumen-web:${{ github.ref_name }}
            ${{ github.ref_name == 'main' && format('ghcr.io/{0}/lumen-web:latest', steps.meta.outputs.owner_lc) || '' }}
          cache-from: type=gha,scope=lumen-web
          cache-to: type=gha,mode=max,scope=lumen-web
      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.meta.outputs.owner_lc }}/lumen-api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          # exit-code: "0" keeps the scan informational (uploads SARIF
          # to Security tab) instead of blocking the build on CVEs.
          # Bump to "1" once the base images are pinned to digests so
          # noise stays low.
          exit-code: "0"
      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.meta.outputs.owner_lc }}/lumen-web:${{ github.sha }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
        continue-on-error: true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    timeout-minutes: 25
    # COMPOSE_FILE is a Compose-native env var that every `docker
    # compose …` invocation in this job inherits, so we don't have
    # to repeat `-f docker-compose.yml -f docker-compose.ci.yml`
    # on the up / exec / logs / down calls below. The overlay
    # swaps `web` from dev mode (pnpm dev + JIT compile, the source
    # of the WebKit hydration race) to the prod standalone build —
    # same image AWS is running.
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        # The e2e suite needs LLM_PROVIDER=noop AND EMBEDDING_PROVIDER=noop
        # pinned regardless of what's in .env.example. LLM noop keeps the
        # tutor turns deterministic + free. Embedding noop avoids importing
        # sentence-transformers — it's not in pyproject.toml's dep list
        # (only in the type-ignore stubs), so the `local` default would
        # crash the `Pre-index seeded lesson chunks` step with
        # ModuleNotFoundError. NoopEmbeddingProvider returns deterministic
        # L2-normalised unit vectors derived from SHA-256, which is exactly
        # what the tutor-citations spec needs (a stable vector per chunk
        # to drive retrieval ordering — semantic quality isn't asserted).
        # `>>` keeps any other tweaks the operator has made to the
        # template (e.g. SEED_DEMO=true is already on by default).
        run: |
          cp .env.example .env
          {
            echo ""
            echo "# e2e workflow overrides"
            echo "LLM_PROVIDER=noop"
            echo "EMBEDDING_PROVIDER=noop"
          } >> .env

      - name: Start dev stack
        # Bring up everything the e2e specs touch: db, redis, s3 (for
        # the ingest preview's image fetches), mailpit (for the auth
        # spec's token retrieval), api, worker (so embedding ingestion
        # actually runs against the seeded course), and web.
        run: |
          docker compose up -d --build \
            db redis s3 s3-init mail api worker web

      - name: Wait for api healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v1/health/live >/dev/null 2>&1; then
              echo "api up"; exit 0
            fi
            sleep 2
          done
          echo "api never became healthy"; docker compose logs api; exit 1

      - name: Wait for web ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "web up"; exit 0
            fi
            sleep 2
          done
          echo "web never became reachable"; docker compose logs web; exit 1

      - name: Wait for mailpit ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8025/api/v1/info >/dev/null 2>&1; then
              echo "mailpit up"; exit 0
            fi
            sleep 1
          done
          echo "mailpit never became reachable"; docker compose logs mail; exit 1

      - name: Migrate + seed
        run: |
          docker compose exec -T api alembic upgrade head
          docker compose exec -T api python -m app.cli seed

      - name: Pre-index seeded lesson chunks
        # The seed inserts the published course directly, bypassing
        # the publish hook that normally enqueues
        # ``index_course_embeddings``. The tutor-citations spec
        # needs lesson_chunks populated to surface citations, so we
        # run the indexing inline here.
        run: |
          docker compose exec -T api python -c "
          import asyncio
          from sqlalchemy import select
          from app.db.base import get_sessionmaker
          from app.models.course import Course, CourseStatus
          from app.services.embeddings_ingest import ingest_course

          async def main():
              Session = get_sessionmaker()
              async with Session() as db:
                  rows = (await db.execute(
                      select(Course.id).where(
                          Course.status == CourseStatus.published,
                          Course.deleted_at.is_(None),
                      )
                  )).all()
                  for (cid,) in rows:
                      written = await ingest_course(db, cid)
                      print(f'indexed {cid}: {written} chunks')

          asyncio.run(main())
          "

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Get Playwright version
        id: playwright-version
        working-directory: apps/frontend
        # Cache key changes when @playwright/test version changes — the
        # browser binary directory name (e.g. ms-playwright/webkit-2104)
        # is keyed off the Playwright version, so a stale cache that
        # matches the lockfile hash but ships old binaries would have
        # `playwright install-deps` go down the cache-hit branch (system
        # deps only, no binary install) and the run blows up with
        # `Executable doesn't exist at .../webkit-2104/pw_run.sh`.
        run: |
          v=$(jq -r '.devDependencies["@playwright/test"] // .dependencies["@playwright/test"]' package.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Browser-set segment `-cw-` (chromium+webkit) — the
          # accessibility job uses `-c-` (chromium-only). Keeping them
          # on separate keys is what stops the earlier "a11y populates
          # cache with chromium, then e2e hits the same key and skips
          # install, then dies on missing webkit-2104" failure mode.
          # Plus `pw2` to bust the pre-bump cache that had the same
          # browser-agnostic problem.
          key: ${{ runner.os }}-pw2-cw-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('apps/frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install-deps chromium webkit

      - name: Run Playwright e2e suite
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_BASE_URL: http://localhost:8000
          MAILPIT_BASE_URL: http://localhost:8025
        # Pin the golden-path specs explicitly so we don't pick up
        # the unrelated axe scan in this workflow (that runs in the
        # accessibility job below).
        run: |
          pnpm exec playwright test \
            tests/e2e/auth.spec.ts \
            tests/e2e/learner-flow.spec.ts \
            tests/e2e/instructor-golden.spec.ts \
            tests/e2e/tutor-citations.spec.ts \
            tests/e2e/ingest-multimodal.spec.ts

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Capture container logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/compose-logs
          docker compose logs --no-color api > /tmp/compose-logs/api.log || true
          docker compose logs --no-color worker > /tmp/compose-logs/worker.log || true
          docker compose logs --no-color web > /tmp/compose-logs/web.log || true
          docker compose logs --no-color mail > /tmp/compose-logs/mail.log || true

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: /tmp/compose-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down dev stack
        if: always()
        run: docker compose down -v

  accessibility:
    name: Accessibility (WCAG 2.2 AA)
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    timeout-minutes: 30
    # COMPOSE_FILE picks up the overlay that switches `web` from the
    # dev JIT-compile target to the prod standalone build. Same
    # rationale as the e2e job — kills the hydration race that was
    # flaking authenticated routes. See docker-compose.ci.yml for
    # the full why.
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env
        run: cp .env.example .env

      - name: Start dev stack
        run: docker compose up -d --build db redis s3 s3-init mail api web

      - name: Wait for api healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v1/health/live >/dev/null 2>&1; then
              echo "api up"; exit 0
            fi
            sleep 2
          done
          echo "api never became healthy"; docker compose logs api; exit 1

      - name: Wait for web ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "web up"; exit 0
            fi
            sleep 2
          done
          echo "web never became reachable"; docker compose logs web; exit 1

      - name: Migrate + seed
        run: |
          docker compose exec -T api alembic upgrade head
          docker compose exec -T api python -m app.cli seed

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile || pnpm install

      # Cache the Playwright browser binaries — they're ~300 MB and
      # the WCAG suite only needs Chromium, but the install also
      # pulls system deps via apt. Re-running the install when the
      # cache hits is a no-op.
      - name: Get Playwright version
        id: playwright-version
        working-directory: apps/frontend
        # Bake the Playwright version into the cache key so a lockfile-
        # hash hit on stale binaries can't poison the run. See the
        # e2e job for the full rationale.
        run: |
          v=$(jq -r '.devDependencies["@playwright/test"] // .dependencies["@playwright/test"]' package.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Browser-set segment `-c-` (chromium-only) distinguishes
          # this cache from the e2e job's `-cw-` (chromium+webkit).
          # Per-browser-set keys keep the two installs from poisoning
          # each other's cache hits.
          key: ${{ runner.os }}-pw2-c-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('apps/frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/frontend
        run: pnpm exec playwright install-deps chromium

      - name: Run axe accessibility suite
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        # Project-pinned to chromium — axe-core's rule set is
        # browser-agnostic and running every spec across chromium +
        # webkit doubles wallclock for no extra signal.
        run: pnpm exec playwright test tests/e2e/accessibility.spec.ts --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-axe-report
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          if-no-files-found: ignore

      - name: Tear down dev stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to AWS
    # Fan-in of every ship-readiness gate. Adding a sixth gate?
    # Append its job name here so the deploy only fires after it
    # passes. The regression test
    # apps/frontend/tests/ci-workflow-shape.test.ts pins this list
    # so a future "while I'm here" edit can't silently drop one.
    needs: [backend, frontend, build-images, e2e, accessibility]
    # Push-to-main only — PRs would attempt a deploy that has no
    # business firing, and `workflow_dispatch` on this composite
    # workflow isn't supported. Manual deploys (rollback / pin)
    # go via `gh workflow run deploy.yml` directly, which keeps
    # all gates skippable for emergency operator use.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Reusable-workflow call. deploy.yml's `deploy` job carries the
    # `environment: production` gate, so the approval click happens
    # there regardless of caller.
    uses: ./.github/workflows/deploy.yml
    with:
      # Pin to the exact SHA the build-images job published so a
      # subsequent push to main can't race the deploy onto a newer
      # `:latest` image than this CI run actually verified.
      image_tag: ${{ github.sha }}
      commit_sha: ${{ github.sha }}
