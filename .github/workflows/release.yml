name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    # Native arm64 on a free GitHub-hosted arm64 runner (public repo).
    # These tags (:vX.Y.Z + :latest) are pulled by the Graviton prod
    # box, so they must be arm64 — previously this job had no
    # `platforms:` and published amd64-only, which would have moved
    # `:latest` to an undeployable arch on any tagged release. Matches
    # ci.yml's build-images; see ADR-0023.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repository owner
        id: owner
        # GHCR rejects mixed-case repository names. ``github.repository_owner``
        # preserves GitHub's original casing (``ahmedEid1``), which buildx
        # surfaces as ``ERROR: invalid tag ... : repository name must be
        # lowercase``. Compute the lowercase form once here and splice
        # it into the image tags below.
        run: echo "lc=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/lumen-api:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.lc }}/lumen-api:latest
          sbom: true
          provenance: true
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/lumen-web:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.lc }}/lumen-web:latest
          sbom: true
          provenance: true
      - name: Extract changelog slice
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            BEGIN { p=0 }
            /^## \[/ { if (p==1) exit; if ($0 ~ "\\["v"\\]") { p=1; next } }
            p==1 { print }
          ' CHANGELOG.md > release-notes.md || echo "Release $GITHUB_REF_NAME" > release-notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
