name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/lumen-api:latest
          sbom: true
          provenance: true
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lumen-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/lumen-web:latest
          sbom: true
          provenance: true
      - name: Extract changelog slice
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            BEGIN { p=0 }
            /^## \[/ { if (p==1) exit; if ($0 ~ "\\["v"\\]") { p=1; next } }
            p==1 { print }
          ' CHANGELOG.md > release-notes.md || echo "Release $GITHUB_REF_NAME" > release-notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
