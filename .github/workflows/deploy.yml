name: Deploy to AWS

# Continuous Delivery for the Lumen demo. Pulls the latest container
# images from ghcr.io into the AWS t4g.small VM at
# lumen.ahmedhobeishy.tech, runs Alembic migrations, restarts the
# stack via `docker compose -f docker-compose.prod.yml`, and waits for
# the `/api/v1/health/live` smokes to come back 200 before reporting
# success.
#
# Triggers: **workflow_dispatch only.**
#
# An earlier draft of this file also wired a `workflow_run` trigger
# against CI / E2E / Accessibility on Rewrite for auto-deploy. Two
# reviewer-caught problems killed that path:
#
#   1. `workflow_run` fires once per listed upstream workflow, not
#      after an AND of all three completing. A single Rewrite push
#      where all three eventually pass would queue 3 sequential
#      deploys (each idempotent but each pulling images and re-running
#      smokes), and the first deploy could fire before E2E had
#      finished — defeating the whole "all gates green before
#      shipping" invariant.
#   2. `workflow_run` only triggers from a workflow file that lives on
#      the repository's *default branch*. The default here is `master`
#      (per `gh remote show origin`), and Rewrite hasn't been merged
#      to master in 358+ commits — so the trigger would have silently
#      never fired even if (1) were solved.
#
# The right fix for both is to consolidate CI / E2E / Accessibility
# into one workflow whose final job is a single deploy trigger. That's
# a separate piece of work (see docs/ci-cd.md "Future enhancements").
# Until then, deploys are explicit operator clicks — pair with branch
# protection that requires all gates green before merging to Rewrite
# and the loss of "auto-deploy" is mostly cosmetic.
#
# To deploy after a green CI run:
#   gh workflow run deploy.yml                              # defaults: :latest, run migrations
#   gh workflow run deploy.yml -f image_tag=<sha>           # rollback / pin
#   gh workflow run deploy.yml -f run_migrations=false      # skip alembic
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   AWS_SSH_HOST         hostname or IP of the box (e.g. "lumen.ahmedhobeishy.tech")
#   AWS_SSH_USER         linux account to ssh as (e.g. "lumen")
#   AWS_SSH_PRIVATE_KEY  full PEM contents of the operator's deploy key
#   AWS_KNOWN_HOSTS      output of `ssh-keyscan -H <host>` for that host
#                        (locks down StrictHostKeyChecking so a MITM
#                        can't impersonate the box on first deploy)
#   GHCR_PULL_TOKEN      classic PAT with `read:packages` scope. Set this
#                        ONLY if the ghcr images aren't public. Cheapest
#                        way to support private packages.
#   APP_DOMAIN           e.g. "lumen.ahmedhobeishy.tech". Used for the
#                        post-deploy smoke (`curl https://${APP_DOMAIN}/…`)
#                        so we test what users actually hit, not the
#                        internal compose network.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        # No leading colon — `docker-compose.prod.yml` appends
        # `:${IMAGE_TAG:-latest}` already. `rewrite` produces
        # `lumen-api:rewrite`; `:rewrite` would produce
        # `lumen-api::rewrite` and the pull 404s. Examples mirror what
        # ci.yml:build-images publishes (latest, rewrite, the 40-char
        # SHA, or a vX.Y.Z release tag).
        description: "Image tag to deploy (default: latest). Examples: latest, rewrite, <40-char-sha>, vX.Y.Z"
        required: false
        default: "latest"
      commit_sha:
        description: "Commit to check out on the box (default: tip of Rewrite). Set on rollback so compose + alembic match the image tag. 7-40 hex chars."
        required: false
        default: ""
      run_migrations:
        description: "Run alembic upgrade head after pull?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

# Don't run two deploys in parallel — the latter would race the
# former's `docker compose up -d`. `cancel-in-progress: false` means
# an in-flight deploy isn't aborted (rolling deploys are non-atomic;
# aborting mid-restart leaves the stack in a known-bad state).
concurrency:
  group: deploy-aws
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Roll AWS
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Inputs hoisted to job-level env are non-secret. The
    # GHCR_PULL_TOKEN secret is intentionally NOT here — exposing a
    # PAT to every step (including third-party actions in this job)
    # widens its blast radius for no benefit, so we keep it scoped to
    # the docker-login step and use a separate `HAS_GHCR_TOKEN`
    # boolean here purely to gate that step's `if:` condition (which
    # can't see `secrets.X` directly).
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      COMMIT_SHA: ${{ inputs.commit_sha }}
      HAS_GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN != '' && 'true' || 'false' }}
    steps:
      - name: Verify required secrets are present
        # Fail loud and early with a readable message instead of letting
        # the ssh-action error with "Permission denied (publickey)".
        run: |
          missing=()
          [ -n "${{ secrets.AWS_SSH_HOST }}" ] || missing+=(AWS_SSH_HOST)
          [ -n "${{ secrets.AWS_SSH_USER }}" ] || missing+=(AWS_SSH_USER)
          [ -n "${{ secrets.AWS_SSH_PRIVATE_KEY }}" ] || missing+=(AWS_SSH_PRIVATE_KEY)
          [ -n "${{ secrets.AWS_KNOWN_HOSTS }}" ] || missing+=(AWS_KNOWN_HOSTS)
          [ -n "${{ secrets.APP_DOMAIN }}" ] || missing+=(APP_DOMAIN)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required deploy secrets not configured: ${missing[*]}"
            echo "Set them in Settings → Secrets and variables → Actions. See .github/workflows/deploy.yml header for descriptions."
            exit 1
          fi

      - name: Configure SSH
        # webfactory/ssh-agent loads the key into an agent and prepends
        # the configured known_hosts so StrictHostKeyChecking can stay
        # on without breaking the first connection.
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}

      - name: Trust AWS host fingerprint
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Authenticate box to ghcr (if pulling private images)
        # Gate on the HAS_GHCR_TOKEN boolean (job-level env above) —
        # `secrets` context isn't readable in step-level `if`. The
        # actual token only enters this step's env, not the job's, so
        # other steps in the job can't read it.
        if: ${{ env.HAS_GHCR_TOKEN == 'true' }}
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        # Pipe the token over stdin into a remote `docker login` so it
        # never lands in process listings or the GH log. The PAT only
        # needs `read:packages` scope; rotate it on a calendar tick.
        run: |
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_SSH_HOST }} \
              "docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin" <<< "${GHCR_PULL_TOKEN}"

      - name: Sync repo on the box
        # Keep the box's git checkout aligned with the commit we're
        # rolling out. The compose file + bootstrap script come from
        # here, so a stale repo could pull new images against an old
        # compose anchor.
        #
        # If `commit_sha` was passed (rollback case), reset to that
        # exact commit so the compose file matches the image we're
        # pinning. Otherwise track the tip of `Rewrite`. The previous
        # version unconditionally reset to `origin/Rewrite`, which
        # quietly broke rollbacks: an old image was launched against
        # a current compose definition with potentially different
        # services / env vars.
        env:
          # Pass through to the runner shell. Empty string ⇒ "use
          # Rewrite tip".
          COMMIT_SHA: ${{ env.COMMIT_SHA }}
        run: |
          set -euxo pipefail

          # Validate commit_sha BEFORE letting it anywhere near a
          # remote shell. Without this, a manual dispatch with
          # `commit_sha=$(rm -rf ~)` (or just a single quote) would
          # break out of the remote-side quoting and execute on the
          # box. Whitelist hex-only, 7-40 chars (git short to full
          # SHA-1).
          if [ -n "${COMMIT_SHA}" ] && ! printf '%s' "${COMMIT_SHA}" | grep -qE '^[0-9a-fA-F]{7,40}$'; then
            echo "::error::commit_sha must be 7-40 hex characters; got '${COMMIT_SHA}'"
            exit 1
          fi

          # Send COMMIT_SHA through the SSH connection's environment
          # rather than string-interpolating into the remote shell.
          # `SendEnv` + the server's `AcceptEnv COMMIT_SHA` would be
          # cleaner, but most sshd_configs don't `AcceptEnv` arbitrary
          # names — passing it as a plain shell-arg via `bash -s --`
          # avoids both quoting holes and server-side AcceptEnv config.
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_SSH_HOST }} \
              "bash -s -- '${COMMIT_SHA}'" <<'REMOTE'
            set -euo pipefail
            COMMIT_SHA="${1-}"
            cd ~/lumen
            git fetch --depth=50 origin Rewrite
            if [ -n "${COMMIT_SHA}" ]; then
              echo "Rolling out specific commit: ${COMMIT_SHA}"
              git fetch --depth=50 origin "${COMMIT_SHA}" || true
              git -c advice.detachedHead=false checkout "${COMMIT_SHA}"
            else
              echo "Rolling out Rewrite tip"
              git checkout Rewrite
              git reset --hard origin/Rewrite
            fi
            git --no-pager log -1 --pretty=format:'deploy commit: %H %s%n'
          REMOTE

      - name: Pull new images
        run: |
          set -euxo pipefail
          # IMAGE_TAG flows in via env so .env.production on the box
          # doesn't need editing for every deploy. `docker compose`
          # picks up the env var at parse time when invoked with -E.
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_SSH_HOST }} \
              "cd ~/lumen && \
               IMAGE_TAG=${IMAGE_TAG} \
               docker compose -f docker-compose.prod.yml --env-file ~/.env.production pull api web worker beat"

      - name: Roll stack
        # `up -d` is idempotent — Compose restarts services whose image
        # tag, env, or compose-file content changed; untouched services
        # stay up. Start with api so the DB connection settles before
        # worker/beat resume; web last so the proxy doesn't briefly
        # serve a stale frontend against a new api.
        run: |
          set -euxo pipefail
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_SSH_HOST }} \
              "cd ~/lumen && \
               IMAGE_TAG=${IMAGE_TAG} \
               docker compose -f docker-compose.prod.yml --env-file ~/.env.production up -d --remove-orphans api worker beat web"

      - name: Run migrations
        if: ${{ github.event.inputs.run_migrations != 'false' }}
        # Migrations run AFTER `up -d` because the new api container
        # has to be alive to host the alembic command (it's the same
        # image, but exec needs a running container). Idempotent —
        # rerunning `upgrade head` with no pending revisions is a
        # 1-second no-op.
        run: |
          set -euxo pipefail
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_SSH_HOST }} \
              "cd ~/lumen && \
               IMAGE_TAG=${IMAGE_TAG} \
               docker compose -f docker-compose.prod.yml --env-file ~/.env.production exec -T api alembic upgrade head"

      - name: Smoke test
        # Hit the live HTTPS endpoint so we test what users see — Caddy
        # + TLS + the standalone web + the api reverse-proxy. /live is
        # cheap (no DB); /ready hits db + redis so we catch
        # config-rot pre-rollback. Retry briefly to absorb container
        # restart settling.
        run: |
          set -euxo pipefail
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "https://${{ secrets.APP_DOMAIN }}/api/v1/health/live" >/dev/null \
            && curl -fsS --max-time 5 "https://${{ secrets.APP_DOMAIN }}/api/v1/health/ready" >/dev/null; then
              echo "smokes green"
              exit 0
            fi
            echo "smoke $i/30 not green yet — sleeping 5s"
            sleep 5
          done
          echo "::error::Smoke tests failed after 2.5 minutes — manual investigation needed"
          exit 1

      - name: Capture post-deploy compose state (debug)
        # Always — even on failure — so an aborted deploy leaves
        # breadcrumbs in the run log. `ps` shows which images each
        # service is on; if a pull half-succeeded the mix is here.
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=yes \
              ${{ secrets.AWS_SSH_USER }}@${{ secrets.AWS_SSH_HOST }} \
              "cd ~/lumen && docker compose -f docker-compose.prod.yml --env-file ~/.env.production ps" || true
