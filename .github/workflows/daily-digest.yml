# =============================================================
# Daily digest — Celery-beat replacement
#
# Why this workflow exists
# ------------------------
# Fly's scale-to-zero stops the worker Machine when idle. That
# kills the in-process `celery beat` scheduler — a beat process
# needs a continuously running container to tick at 07:00 UTC.
#
# Replacing beat with a GitHub Actions cron:
#   - Is free (GitHub-hosted runners have generous cron quotas).
#   - Doesn't keep the worker Machine warm (idle ≠ traffic).
#   - Is auditable — every run shows up in Actions history with
#     stdout, exit code, timing.
#
# Pattern: `flyctl ssh console -C "<celery call cmd>"` connects
# to the worker Machine (auto-starting it if asleep) and runs
# the Celery task synchronously inside that VM. The Machine
# then idles back to zero after `auto_stop_machines` fires.
#
# Required secrets:
#   FLY_API_TOKEN — same one used by deploy.yml.
#
# Cron schedule mirrors the Celery beat entry in
# apps/backend/app/workers/celery_app.py:
#   "send-daily-digests" → crontab(hour="7", minute="0")
# =============================================================

name: Daily digest

on:
  schedule:
    # 07:00 UTC daily — matches the existing Celery beat slot.
    # GitHub cron uses 5-field cron syntax, no seconds.
    - cron: "0 7 * * *"
  # Manual trigger so the operator can verify the wiring
  # without waiting for 07:00.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-digest:
    name: Send daily digests via worker
    runs-on: ubuntu-24.04
    # Total budget per run: ~3 min. The task itself is sub-second
    # at small scale; the bulk is Fly's cold-start (~5-15 s) and
    # ssh handshake (~3 s).
    timeout-minutes: 5
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Send digest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # `flyctl ssh console -C` auto-starts a stopped Machine,
          # runs the command, captures stdout/stderr, and exits.
          # We use `celery ... call` (sync send to the broker)
          # rather than `.delay()` because:
          #   1. We want the job to land in Redis even if no
          #      worker is currently consuming — the next worker
          #      tick (i.e. the next time someone deploys, or the
          #      cron's auto-started Machine) picks it up.
          #   2. `call` returns immediately once the broker
          #      accepts the message, so this Actions step
          #      doesn't sit there waiting for the email send.
          #
          # If you'd rather block until the task finishes,
          # switch to `celery ... call --kwargs '{}' && celery
          # ... result <task-id>` — but at scale that'll cost
          # more Actions minutes than it saves anyone time.
          flyctl ssh console \
            --app lumen-worker \
            --command "celery -A app.workers.celery_app.celery call app.workers.tasks.digest.send_daily_digests"
      - name: Log status
        if: always()
        run: |
          echo "Digest dispatched at $(date -u +%FT%TZ)"
          echo "Check worker logs for delivery details:"
          echo "  flyctl logs --app lumen-worker"
