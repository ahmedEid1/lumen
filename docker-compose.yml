name: lumen

x-api-env: &api-env
  ENV: ${ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TZ: ${TZ:-UTC}
  SECRET_KEY: ${SECRET_KEY}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
  REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-1209600}
  # pydantic-settings v2 parses ``list[str]`` env vars as JSON before
  # the @field_validator(mode="before") gets a chance, so the value
  # must be a JSON array — not a comma-separated string.
  #
  # `http://web:3000` is required by the `e2e` profile: the bundle
  # served to Playwright inside the e2e container has origin
  # `http://web:3000`, and without it the api rejects every API
  # call with `400 Disallowed CORS origin` (iter 103).
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://web:3000"]}
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
  S3_REGION: ${S3_REGION}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_FROM: ${SMTP_FROM}
  SENTRY_DSN: ${SENTRY_DSN:-}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
  SEED_DEMO: ${SEED_DEMO:-true}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 15s

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumen}
      POSTGRES_DB: ${POSTGRES_DB:-lumen}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis-data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    ports:
      - "6379:6379"

  s3:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lumen}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lumen-secret}
    volumes:
      - s3-data:/data
    healthcheck:
      <<: *healthcheck-defaults
      # Iter 112: MinIO needs ~10-20s on first boot before it binds
      # port 9000; the default 15s start_period sometimes trips
      # `dependency failed to start` for s3-init / api during a
      # cold `docker compose up`. Bump it so the first-boot race
      # stops being flaky.
      start_period: 30s
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
    ports:
      - "9000:9000"
      - "9001:9001"

  s3-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      s3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://s3:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb -p local/$$S3_BUCKET || true
        mc anonymous set download local/$$S3_BUCKET
        mc admin user svcacct add local "$$MINIO_ROOT_USER" --access-key "$$S3_ACCESS_KEY_ID" --secret-key "$$S3_SECRET_ACCESS_KEY" || true
        echo "MinIO bootstrap complete"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lumen}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lumen-secret}
      S3_BUCKET: ${S3_BUCKET:-lumen-assets}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-lumen}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-lumen-secret}
    restart: "no"

  mail:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./apps/backend
      target: dev
    image: lumen-api:dev
    restart: unless-stopped
    environment: *api-env
    volumes:
      - ./apps/backend:/app
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      s3: { condition: service_healthy }
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "app"]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=2).status==200 else 1)"]
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./apps/backend
      target: dev
    image: lumen-api:dev
    restart: unless-stopped
    environment: *api-env
    volumes:
      - ./apps/backend:/app
    depends_on:
      api: { condition: service_started }
      redis: { condition: service_healthy }
    command: ["celery", "-A", "app.workers.celery_app.celery", "worker", "--loglevel=INFO", "--concurrency=2"]

  beat:
    build:
      context: ./apps/backend
      target: dev
    image: lumen-api:dev
    restart: unless-stopped
    environment: *api-env
    volumes:
      - ./apps/backend:/app
    depends_on:
      api: { condition: service_started }
      redis: { condition: service_healthy }
    command: ["celery", "-A", "app.workers.celery_app.celery", "beat", "--loglevel=INFO"]

  web:
    build:
      context: ./apps/frontend
      target: dev
    image: lumen-web:dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000}
      API_INTERNAL_BASE_URL: http://api:8000
      PORT: "3000"
    volumes:
      - ./apps/frontend:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
      # Read-only mount of the compose file so the iter 99
      # vitest regression (tests/e2e-image-pin.test.ts) can
      # confirm the Playwright image tag stays in lock-step with
      # @playwright/test in package.json. Reached via the
      # /repo/docker-compose.yml symlink resolution in the test.
      - ./docker-compose.yml:/repo/docker-compose.yml:ro
    depends_on:
      api: { condition: service_started }
    command: ["pnpm", "dev"]
    ports:
      - "3000:3000"

  # Dedicated Playwright runner. The `web` image is alpine-based
  # (musl libc) and Playwright doesn't ship browser binaries for
  # musl — `pnpm exec playwright install` inside `web` either
  # fails or pulls glibc binaries that segfault. The custom
  # Dockerfile.e2e extends mcr.microsoft.com/playwright (chromium
  # / firefox / webkit pre-built against glibc) and bakes
  # `pnpm install` into an image layer so node_modules doesn't
  # have to be re-built into a Docker volume on every run —
  # critical on Windows Docker Desktop where the pnpm symlink
  # fan-out into a named volume crawls (~10 packages/min). The
  # anonymous `/work/node_modules` volume keeps the bind-mount
  # of `./apps/frontend:/work` from shadowing the baked install.
  #
  # Profile-gated so `docker compose up` doesn't start it:
  #     docker compose --profile e2e run --rm e2e
  #     make test.e2e
  #
  # The image's Playwright version is enforced by
  # tests/e2e-image-pin.test.ts to stay pinned to
  # @playwright/test in package.json.
  e2e:
    profiles: ["e2e"]
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.e2e
    image: lumen-e2e:dev
    environment:
      E2E_BASE_URL: ${E2E_BASE_URL:-http://web:3000}
    volumes:
      - ./apps/frontend:/work
      # Anonymous volume preserves the image's baked
      # node_modules from the bind-mount above.
      - /work/node_modules
    depends_on:
      web: { condition: service_started }
      api: { condition: service_started }

volumes:
  db-data:
  redis-data:
  s3-data:
  web-node-modules:
  web-next-cache:

networks:
  default:
    name: lumen-dev
