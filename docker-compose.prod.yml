name: lumen-prod

x-api-env: &api-env
  # ENV is overridable so an operator can stage a deploy before the LLM key
  # is in .env.production (the H6 prod guard rejects LLM_PROVIDER=noop in
  # production). Defaults to production so a complete .env.production
  # behaves like before.
  ENV: ${ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TZ: ${TZ:-UTC}
  SECRET_KEY: ${SECRET_KEY}
  JWT_SECRET: ${JWT_SECRET}
  ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
  REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-1209600}
  # pydantic-settings parses list[str] env vars as JSON before our @field_validator
  # runs, so this must be a JSON array — not the plain URL it used to be.
  CORS_ORIGINS: '["https://${APP_DOMAIN}"]'
  WEB_BASE_URL: ${WEB_BASE_URL:-https://${APP_DOMAIN}}
  API_BASE_URL: ${API_BASE_URL:-https://${APP_DOMAIN}}
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
  REDIS_URL: ${REDIS_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_PUBLIC_BASE_URL: https://${APP_DOMAIN}/assets
  S3_REGION: ${S3_REGION}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM: ${SMTP_FROM}
  SMTP_TLS: "true"
  SENTRY_DSN: ${SENTRY_DSN:-}
  PROMETHEUS_ENABLED: "true"
  # Embedding + LLM pass-through. Both default to noop so the stack
  # boots without paid credentials in dev. In production ENV the
  # prod-boot guard (apps/backend/app/core/prod_guards.py) refuses both
  # LLM_PROVIDER=noop and EMBEDDING_PROVIDER=noop. Without the embedding
  # guard, RAG would silently degrade to hash-derived pseudo-random unit
  # vectors (apps/backend/app/services/embeddings.py NoopEmbeddingProvider)
  # — cosine similarity stays well-defined, but rankings become arbitrary
  # noise with no error in the logs. The guard turns that into a loud
  # boot-time refusal instead.
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-noop}
  EMBEDDING_MODEL_LOCAL: ${EMBEDDING_MODEL_LOCAL:-sentence-transformers/all-MiniLM-L6-v2}
  EMBEDDING_MODEL_OPENAI: ${EMBEDDING_MODEL_OPENAI:-text-embedding-3-small}
  # Embedding-specific OpenAI-compat endpoint overrides. Let the embedding
  # provider hit a different host than the LLM (e.g. Cloudflare Workers AI
  # for embeddings while Groq drives the chat LLM). Empty defaults mean
  # the existing shared OPENAI_API_KEY / OPENAI_API_BASE fall through.
  EMBEDDING_OPENAI_API_BASE: ${EMBEDDING_OPENAI_API_BASE:-}
  EMBEDDING_OPENAI_API_KEY: ${EMBEDDING_OPENAI_API_KEY:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-noop}
  LLM_MODEL: ${LLM_MODEL:-}
  LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_API_BASE: ${ANTHROPIC_API_BASE:-}
  # L41 — Mistral La Plateforme (OpenAI-compatible). Free-tier-only
  # by default; operators tune via `.env.production`. The base URL
  # defaults to the public la-plateforme endpoint; override for a
  # private deployment.
  MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
  MISTRAL_API_BASE: ${MISTRAL_API_BASE:-https://api.mistral.ai/v1}
  MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
  # Open Badges 3.0 issuer + key. ISSUER_URL must dereference; the prod-boot
  # guard rejects localhost defaults in production. SIGNING_KEY is an
  # Ed25519 PEM — when empty the app derives one from SECRET_KEY in
  # non-production envs but the prod guard refuses derivation.
  BADGES_ISSUER_URL: ${BADGES_ISSUER_URL:-https://${APP_DOMAIN}}
  BADGES_SIGNING_KEY: ${BADGES_SIGNING_KEY:-}
  NOTION_TOKEN: ${NOTION_TOKEN:-}
  HIBP_ENABLED: ${HIBP_ENABLED:-false}
  RATE_LIMIT_ANON_PER_MINUTE: ${RATE_LIMIT_ANON_PER_MINUTE:-60}
  RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-10}
  RATE_LIMIT_USER_PER_MINUTE: ${RATE_LIMIT_USER_PER_MINUTE:-240}
  # L21a/b — streaming tutor feature flag. OFF by default so a deploy
  # lands inert; the operator flips via `flip-flag.yml`. Default
  # `false` mirrors `Settings.feature_tutor_streaming`.
  FEATURE_TUTOR_STREAMING: ${FEATURE_TUTOR_STREAMING:-false}
  # L33 — tutor cost-cap + concurrency knobs. Defaults match
  # Settings; operators tune via .env.production without a code
  # change. All microcent integers (USD * 1e6).
  TUTOR_ESTIMATE_MICROCENTS: ${TUTOR_ESTIMATE_MICROCENTS:-5000}
  TUTOR_CAP_USER_MICROCENTS: ${TUTOR_CAP_USER_MICROCENTS:-500000}
  TUTOR_CAP_IP_MICROCENTS: ${TUTOR_CAP_IP_MICROCENTS:-2000000}
  TUTOR_CAP_GLOBAL_MICROCENTS: ${TUTOR_CAP_GLOBAL_MICROCENTS:-20000000}
  TUTOR_MAX_CONCURRENT: ${TUTOR_MAX_CONCURRENT:-3}
  # L21-Sec deploy cutoff for the email-verify grandfather backstop.
  L21SEC_DEPLOY_TIMESTAMP: ${L21SEC_DEPLOY_TIMESTAMP:-2026-05-27T00:00:00Z}

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

  db:
    # pgvector pre-installed — required by Phase E0. See the dev
    # compose comment for the choice of tag.
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # ${REDIS_MAXMEMORY:-0} = unlimited by default (matches stock redis-server
    # behaviour); set REDIS_MAXMEMORY=64mb on t4g.small / 2 GB boxes to keep
    # Redis from starving Postgres + Celery under burst load.
    # Policy is `noeviction`: this same Redis backs CELERY_BROKER_URL and
    # CELERY_RESULT_BACKEND, so an LRU-style policy could silently evict
    # queued tasks under pressure. `noeviction` instead causes writes to
    # fail loudly when full, surfacing as task-enqueue errors operators
    # can act on (instead of jobs vanishing without a trace).
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-0}"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  s3:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - s3-data:/data

  api:
    image: ghcr.io/ahmedeid1/lumen-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment: *api-env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      s3: { condition: service_started }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=2).status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: ghcr.io/ahmedeid1/lumen-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment: *api-env
    depends_on:
      api: { condition: service_started }
    # ${CELERY_CONCURRENCY:-4} defaults to 4 (what the original deploy ran);
    # set CELERY_CONCURRENCY=1 on t4g.small / 2 GB boxes to keep the worker
    # pool from blowing past available RAM under indexing bursts.
    command:
      - "celery"
      - "-A"
      - "app.workers.celery_app.celery"
      - "worker"
      - "--loglevel=INFO"
      - "--concurrency=${CELERY_CONCURRENCY:-4}"

  beat:
    image: ghcr.io/ahmedeid1/lumen-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment: *api-env
    depends_on:
      api: { condition: service_started }
    command: ["celery", "-A", "app.workers.celery_app.celery", "beat", "--loglevel=INFO"]

  web:
    image: ghcr.io/ahmedeid1/lumen-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_WS_BASE_URL: wss://${APP_DOMAIN}
      API_INTERNAL_BASE_URL: http://api:8000
      PORT: "3000"

  backup:
    image: postgres:17-alpine
    profiles: ["backup"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    depends_on:
      db: { condition: service_healthy }
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ts=$$(date -u +%Y-%m-%dT%H-%M-%SZ)
        pg_dump -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} | gzip > /backups/lumen-$$ts.sql.gz
        echo "backup written: /backups/lumen-$$ts.sql.gz"

  prom:
    image: prom/prometheus:v3.0.1
    profiles: ["metrics"]
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus

volumes:
  db-data:
  redis-data:
  s3-data:
  caddy-data:
  caddy-config:
  prom-data:

networks:
  default:
    name: lumen-prod
